# SMAC3 (Bayesian Optimization) PID Tuning Configuration

optimizer:
  method: "smac3"

  # SMAC3-specific parameters
  n_trials: 500                   # Number of optimization trials
  random_fraction: 0.2            # Fraction of trials for random exploration
  settling_threshold: 0.05        # Settling time threshold (5% of final value)

  # Common parameters
  test_duration: 10.0             # Duration of each evaluation test (seconds)
  cost_function: "itae"           # Cost function: "itse" or "itae"
  vehicle_name: "bluerov2"        # Vehicle namespace

  # Results
  results_dir: "/workspace/colcon_ws/src/stonefish_control/stonefish_control_utils/config/optimizer/output/smac3"
  wandb_dir: "/workspace/colcon_ws/src/stonefish_control/stonefish_control_utils/config/optimizer/output/wandb"

  # WandB logging
  use_wandb: true
  wandb_project: "pid-tuning"
  wandb_run_name_prefix: "smac_itae_traj"       # Prefix for run name (e.g., "smac3_itae" -> "smac3_itae_20250107_143022")
                                  # Empty string -> "{method}_{timestamp}" (e.g., "smac3_20250107_143022")

  # Cost function weights (per DOF)
  # Recommended: scale orientation errors to match position units
  # Position: meters, Orientation: radians (1 rad ≈ 57°)
  # Use smaller weights for orientation to balance with position errors
  weights:
    x: 1.0                        # Position weight (meters)
    y: 1.0
    z: 1.0
    roll: 2.0                     # Orientation weight (radians)
    pitch: 2.0
    yaw: 2.0
  lambda_smoothness: 0.1          # Smoothness penalty weight (RMS-normalized, typical range: 0.1-10.0)
  lambda_gain: 0.0                # Gain penalty weight (L2 regularization, 0=disabled, typical: 0.001-0.01)

  # PID gain search bounds [min, max]
  bounds:
    x:
      kp: [0.0, 2000.0]
      kd: [0.0, 1000.0]
      ki: [0.0, 1000.0]
    y:
      kp: [0.0, 2000.0]
      kd: [0.0, 1000.0]
      ki: [0.0, 1000.0]
    z:
      kp: [0.0, 2000.0]
      kd: [0.0, 1000.0]
      ki: [0.0, 1000.0]
    roll:
      kp: [0.0, 1000.0]
      kd: [0.0, 1000.0]
      ki: [0.0, 1000.0]
    pitch:
      kp: [0.0, 1000.0]
      kd: [0.0, 1000.0]
      ki: [0.0, 1000.0]
    yaw:
      kp: [0.0, 1000.0]
      kd: [0.0, 1000.0]
      ki: [0.0, 1000.0]

  # Warm start (optional)
  warm_start_file: "/workspace/colcon_ws/src/stonefish_control/stonefish_control/config/bluerov2/pid_params.yaml"             # Path to previous optimization result (empty = random init)

  # SMAC3 Checkpoint/Resume (built-in feature)
  # SMAC3 automatically saves state in results_dir/smac3_output
  # To resume: just run again with same results_dir and smac_overwrite=false
  # To start fresh: set smac_overwrite=true
  smac_overwrite: false           # false = resume if possible, true = overwrite/start fresh

  # Test scenarios
  scenarios:
    # Step response scenario (original)
    # Initialization (return to origin)
    # - name: "init_origin"
    #   type: "step"
    #   target:
    #     x: 0.0
    #     y: 0.0
    #     z: 0.0
    #     roll: 0.0
    #     pitch: 0.0
    #     yaw: 0.0

    # # Small step (linear region)
    # - name: "small_mixed"
    #   type: "step"
    #   target:
    #     x: 0.1
    #     y: 0.1
    #     z: 0.15
    #     roll: 0.1
    #     pitch: 0.1
    #     yaw: 0.1

    # # Medium step (transition)
    # - name: "medium_mixed"
    #   type: "step"
    #   target:
    #     x: 0.25
    #     y: 0.2
    #     z: 0.3
    #     roll: 0.15
    #     pitch: 0.15
    #     yaw: 0.2

    # # Large step (disturbance)
    # - name: "large_disturbance"
    #   type: "step"
    #   target:
    #     x: 0.5
    #     y: 0.5
    #     z: 0.5
    #     roll: 0.3
    #     pitch: -0.3
    #     yaw: 0.35

    # Trajectory following scenario (new)
    # Uncomment to use trajectory-based optimization
    - name: "trajectory_test"
      type: "trajectory"
      waypoint_file: "/workspace/colcon_ws/src/stonefish_control/stonefish_trajectory_manager/config/example_square_path.yaml"
