# GWO (Grey Wolf Optimizer) PID Tuning Configuration

optimizer:
  method: ""

  # GWO-specific parameters
  n_wolves: 50                    # Number of wolves in the pack (paper uses 30)
  max_iterations: 50              # Maximum optimization iterations (paper converges at 30)

  # SMAC3-specific parameters
  n_trials: 200                   # Number of optimization trials
  random_fraction: 0.2            # Fraction of trials for random exploration
  settling_threshold: 0.05        # Settling time threshold (5% of final value)

  # Common parameters
  test_duration: 10.0             # Duration of each evaluation test (seconds)
  cost_function: "itse"           # Cost function: "itse" or "itae"
  vehicle_name: "bluerov2"        # Vehicle namespace

  # Results
  results_dir: ""
  wandb_dir: ""

  # WandB logging
  use_wandb: true
  wandb_project: ""
  wandb_run_name_prefix: ""       # Prefix for run name (e.g., "gwo_itae" -> "gwo_itae_20250107_143022")
                                  # Empty string -> "{method}_{timestamp}" (e.g., "gwo_20250107_143022")

  # Cost function weights (per DOF)
  weights:
    x: 1.0
    y: 1.0
    z: 1.0
    roll: 1.0
    pitch: 1.0
    yaw: 1.0
  lambda_smoothness: 0.1          # Smoothness penalty weight

  # PID gain search bounds [min, max]
  bounds:
    x:
      kp: [0.0, 2000.0]
      kd: [0.0, 1000.0]
      ki: [0.0, 500.0]
    y:
      kp: [0.0, 1000.0]
      kd: [0.0, 500.0]
      ki: [0.0, 250.0]
    z:
      kp: [0.0, 2000.0]
      kd: [0.0, 1000.0]
      ki: [0.0, 500.0]
    roll:
      kp: [0.0, 500.0]
      kd: [0.0, 250.0]
      ki: [0.0, 125.0]
    pitch:
      kp: [0.0, 500.0]
      kd: [0.0, 250.0]
      ki: [0.0, 125.0]
    yaw:
      kp: [0.0, 1000.0]
      kd: [0.0, 500.0]
      ki: [0.0, 250.0]

  # Warm start (optional)
  warm_start_file: ""             # Path to previous optimization result (empty = random init)

  # Test scenarios (6DOF)
  scenarios:
    # Predefined test scenarios
    - name: "forward_step"
      type: "step"
      target:
        x: 2.0
        y: 0.0
        z: -1.0
        roll: 0.0
        pitch: 0.0
        yaw: 0.0

    - name: "lateral_step"
      type: "step"
      target:
        x: 0.0
        y: 2.0
        z: -1.0
        roll: 0.0
        pitch: 0.0
        yaw: 0.0

    - name: "depth_step"
      type: "step"
      target:
        x: 0.0
        y: 0.0
        z: -2.0
        roll: 0.0
        pitch: 0.0
        yaw: 0.0

    - name: "roll_rotation"
      type: "step"
      target:
        x: 0.0
        y: 0.0
        z: -1.0
        roll: 0.3  # ~17 degrees
        pitch: 0.0
        yaw: 0.0

    - name: "pitch_rotation"
      type: "step"
      target:
        x: 0.0
        y: 0.0
        z: -1.0
        roll: 0.0
        pitch: 0.3  # ~17 degrees
        yaw: 0.0

    - name: "yaw_rotation"
      type: "step"
      target:
        x: 0.0
        y: 0.0
        z: -1.0
        roll: 0.0
        pitch: 0.0
        yaw: 1.57  # 90 degrees

    - name: "combined_6dof"
      type: "step"
      target:
        x: 2.0
        y: 1.5
        z: -1.5
        roll: 0.2
        pitch: 0.15
        yaw: 0.785  # 45 degrees

    # Random scenario generation (for validation)
    - name: "random"
      type: "random"
      count: 5                    # Number of random scenarios to generate
      ranges:
        x: [0.0, 3.0]
        y: [0.0, 3.0]
        z: [-3.0, -0.5]
        roll: [-0.3, 0.3]         # ±17 degrees
        pitch: [-0.3, 0.3]        # ±17 degrees
        yaw: [-3.14, 3.14]        # Full rotation
