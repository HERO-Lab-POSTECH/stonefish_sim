# 4DOF Velocity-Based PID Controller Parameters for BlueROV2
#
# Controller: Velocity Tracking (Cascaded Architecture)
# DOFs: Surge, Sway, Heave, Yaw
# Passive: Roll, Pitch (via buoyancy/gravity, GM ≥ 0.15m)
#
# Reference:
#   - Fossen (2011) Section 10.4: Cascaded Path Following Control
#   - Lekkas & Fossen (2014): ILOS Guidance + Velocity Control
#
# Coordinate Convention:
#   World Frame: NED (North-East-Down)
#   Body Frame: FRD (Forward-Right-Down)
#
# Control Vector: [Surge, Sway, Heave, Yaw]

/**:
  ros__parameters:
    # =========================================
    # Control Mode
    # =========================================
    # IMPORTANT: Set to 'velocity' for cascaded architecture
    control_mode: 'velocity'  # 'position' or 'velocity'

    # =========================================
    # Vehicle Dynamics Reference
    # =========================================
    # IMPORTANT: Controller loads mass, inertia, COG, COB from:
    #   /workspace/colcon_ws/src/stonefish_description/data/robots/bluerov2/config/dynamics_params.yaml
    #
    # DO NOT duplicate dynamics here. This is the SINGLE SOURCE OF TRUTH principle.
    #
    # Values used from dynamics_params.yaml:
    #   - mass: 13.1 kg
    #   - inertial.izz: 0.085 kg·m²

    dynamics_params_path: "/workspace/colcon_ws/src/stonefish_description/data/robots/bluerov2/config/dynamics_params.yaml"

    # =========================================
    # PID Gains (4DOF: Surge, Sway, Heave, Yaw)
    # =========================================
    # Velocity-based control requires LOWER gains than position-based
    # Reason: Velocity errors are smaller than position errors
    #
    # Gain Selection Guidelines:
    #   Kp: Force per velocity error (N·s/m for linear, Nm·s/rad for angular)
    #   Kd: Velocity damping (N·s²/m for linear, Nm·s²/rad for angular)
    #   Ki: Integral compensation for steady-state errors
    #
    # Starting values (will be tuned):
    #   - Surge/Sway/Heave: Based on vehicle mass (~13 kg)
    #   - Yaw: Based on inertia (~0.085 kg·m²)

    # Proportional gains [Surge, Sway, Heave, Yaw]
    # Velocity tracking: τ = Kp × (v_des - v_curr)
    # Increased for faster response (velocity errors need strong reaction)
    # Heave tuned for stable depth control
    Kp: [200.0, 200.0, 350.0, 150.0]

    # Derivative gains [Surge, Sway, Heave, Yaw]
    # Velocity damping: τ_d = Kd × (-v_dot)
    # Kd: [100.0, 100.0, 120.0, 80.0]
    # Heave damping for stable control
    Kd: [100.0, 100.0, 150.0, 80.0]

    # Integral gains [Surge, Sway, Heave, Yaw]
    # Steady-state error compensation
    # Heave: moderate integral to avoid windup
    Ki: [20.0, 20.0, 40.0, 10.0]

    # Back-calculation gains [Surge, Sway, Heave, Yaw]
    # For anti-windup (Åström & Hägglund 1995)
    Kb: [0.8, 0.8, 0.8, 0.8]

    # =========================================
    # Saturation Limits
    # =========================================
    # Same as position mode
    max_force: 800.0   # N
    max_torque: 160.0   # Nm

    # =========================================
    # Anti-Windup Protection (Auto-Calculated)
    # =========================================
    # Integral limits are AUTO-CALCULATED from saturation limits and gains:
    #
    # Formula: integral_limit = (sat_limit / Ki) × integral_safety_factor
    #
    # Example calculation (max_force=800, Ki=[50,50,60,10], safety_factor=2.5):
    #   Surge: (800 / 50) × 2.5 = 40.0
    #   Sway:  (800 / 50) × 2.5 = 40.0
    #   Heave: (800 / 60) × 2.5 = 33.3
    #   Yaw:   (160 / 10) × 2.5 = 40.0
    #
    # Safety Factor Guidelines:
    #   - 1.0: Conservative (integral ≤ 100% of sat_limit)
    #   - 2.0: Balanced (integral ≤ 200% of sat_limit)
    #   - 2.5: Aggressive (integral ≤ 250% of sat_limit) ← Current
    #   - 3.0: Very aggressive (risk of overshoot)
    #
    # Adjusting this parameter:
    #   - Increase: More integral authority, faster to cruise_speed, risk of overshoot
    #   - Decrease: Less integral authority, slower response, better stability
    #
    # Note: This auto-scales with max_force and Ki changes (GWO optimizer compatible!)
    # Conservative to prevent integral windup
    integral_safety_factor: 1.0  # Typical range: 1.0-3.0

    # =========================================
    # Control Loop
    # =========================================
    control_rate: 50.0  # Hz

    # =========================================
    # GWO Optimizer Bounds (Velocity Mode)
    # =========================================
    # optimizer_bounds:
    #   Kp: [10.0, 200.0]    # Velocity proportional gains
    #   Kd: [5.0, 150.0]     # Damping gains
    #   Ki: [0.0, 50.0]      # Integral gains
    #   Kb: [0.3, 1.0]       # Back-calculation gains

    # =========================================
    # Tuning Guidelines (Velocity Mode)
    # =========================================
    # 1. Start with current values
    # 2. Test constant velocity command
    #    - If oscillating: Reduce Kp, increase Kd
    #    - If slow response: Increase Kp
    #    - If steady-state error: Increase Ki
    # 3. Test step velocity change
    #    - Measure: Rise time, overshoot, settling time
    #    - Ideal: <10% overshoot, <2s settling time
    # 4. Test with ILOS guidance
    #    - Verify cruise_speed is achieved
    #    - Check heading tracking accuracy
    # 5. Run GWO optimizer
    #    - Use path following test scenario
    #    - Minimize velocity error + heading error
    #
    # Expected Performance (after tuning):
    #   - Velocity error: <0.05 m/s RMS
    #   - Heading error: <3° RMS
    #   - Steady-state velocity: ±5% of commanded
    #   - Control effort: <40% of saturation
