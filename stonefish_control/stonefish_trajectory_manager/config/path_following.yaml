# 4DOF ILOS Path Following Controller
#
# Reference: Lekkas & Fossen (2014), Fossen (2011)
#
# Frame: cmd_pose.pose (NED world), cmd_pose.velocity (FRD body)
# Max tested speed: 2 knots (1.0 m/s)

/**:
  ros__parameters:
    vehicle_name: 'bluerov2'

    # =========================================
    # PRIMARY PARAMETERS
    # =========================================

    # Target speed (m/s) - max 2 knots recommended
    cruise_speed: 1.0

    # Lookahead distance (m)
    lookahead_distance: 3.0

    # Curve slowdown aggressiveness
    curvature_gain: 3.0

    # [deprecated §4] cross-track sway 채널이 cascade outer로 이관됨.
    # ILOS는 더 이상 lateral_gain을 사용하지 않음(YAML 로드 호환 위해 키 유지).
    lateral_gain: 0.5

    # Minimum speed in curves
    min_speed: 0.3

    # =========================================
    # OPTIONAL: Advanced Settings
    # =========================================

    # Use ALOS instead of ILOS
    use_alos: false

    # Adaptive lookahead (disable if unstable)
    adaptive_lookahead: false

    # ILOS integral gain for steady-state error
    # Now uses leaky integrator to prevent curve accumulation
    # [deprecated §4] ILOS heading 적분(_integral_ey) 제거로 미사용(키만 유지).
    integral_gain: 0.1

    # Velocity limits
    # [deprecated §4] sway 출력이 0이 되어 미사용(키만 유지).
    max_lateral_velocity: 0.5
    max_heave_velocity: 0.4

    # [P6] 곡률 sway feedforward 게인 (≈m/Kp_inner≈0.1 s). 코너 원심력 선제 상쇄.
    # 0이면 비활성(직선만). 실기 튜닝 대상.
    sway_ff_gain: 0.1
