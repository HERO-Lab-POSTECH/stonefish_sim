# 4DOF ILOS Path Following Controller Parameters
#
# Controller: ILOS (Integral Line-of-Sight) Guidance
# DOFs: Surge, Sway, Heave, Yaw
# Passive: Roll, Pitch (via buoyancy/gravity, GM ≥ 0.15m)
#
# Reference:
# - Lekkas & Fossen (2014). "Integral LOS Path Following for Curved Paths"
# - Fossen (2011) Section 10.4: Path Following Control
#
# Frame Convention:
#   cmd_pose.pose: NED world frame (absolute position)
#   cmd_pose.velocity: FRD body frame (direct feedforward to PID)

/**:
  ros__parameters:
    # =========================================
    # Vehicle Name
    # =========================================
    vehicle_name: 'bluerov2'

    # =========================================
    # ILOS Guidance Parameters
    # =========================================
    # Lookahead distance Δ (meters)
    # Physical meaning: How far ahead the robot "looks" on the path
    # - Smaller (1-2m): More aggressive, tighter tracking, may oscillate
    # - Larger (3-5m): Smoother, gentler tracking, more stable
    # Typical range for ROV: 2-5m
    lookahead_distance: 0.5

    # ILOS integral gain κ_ILOS (dimensionless)
    # Physical meaning: Strength of integral action for sideslip/current compensation
    # - Smaller (0.01-0.03): Gentle compensation, slower convergence
    # - Larger (0.05-0.1): Aggressive compensation, faster convergence
    # Start conservative, tune up if cross-track error persists
    integral_gain: 0.03

    # Integral limit (meters)
    # Anti-windup: prevents integral term from growing unbounded
    # Typical: 5-10m for underwater vehicles
    integral_limit: 5.0

    # Lateral correction gain (dimensionless)
    # Physical meaning: How aggressively to correct cross-track error via sway velocity
    # Formula: v_lateral = -K_lateral * e_y
    # - Smaller (0.3-0.5): Gentle correction, smoother path following
    # - Larger (0.7-1.0): Aggressive correction, tighter tracking
    # Balance between tracking accuracy and smoothness
    lateral_gain: 1.0

    # Depth correction gain (dimensionless)
    # Physical meaning: How aggressively to correct depth error via heave velocity
    # Formula: w_correction = K_depth * e_z
    # - Smaller (0.3-0.5): Gentle depth correction, slower convergence
    # - Larger (0.8-1.2): Aggressive depth correction, faster convergence
    # This adds feedback to depth control (in addition to path-based feedforward)
    depth_gain: 0.8

    # =========================================
    # Velocity Profiling (Curvature-Based)
    # =========================================
    # Cruise speed (m/s) - target speed on straight segments
    # Typical for BlueROV2: 0.3-0.8 m/s
    cruise_speed: 1.0

    # Minimum speed (m/s) - minimum speed in tight curves
    # Should be > 0 to ensure continuous progress
    # Typical: 20-40% of cruise speed
    min_speed: 0.3

    # Curvature gain (dimensionless)
    # Controls how aggressively to slow down in curves
    # Formula: u_d = u_cruise / (1 + k_curve * |κ|)
    # - Smaller (1.0-1.5): Less slowdown, faster but less precise
    # - Larger (2.0-3.0): More slowdown, slower but more precise
    curvature_gain: 3.0

    # =========================================
    # Control Loop
    # =========================================
    # Update rate (Hz) - should match 4DOF PID controller rate
    update_rate: 50.0

    # =========================================
    # Tuning Guidelines (ILOS)
    # =========================================
    # 1. Start with default values
    # 2. Test straight line tracking
    #    - If oscillating: Increase lookahead_distance
    #    - If sluggish: Decrease lookahead_distance
    # 3. Test curved path
    #    - If cuts corners: Increase cruise_speed, decrease curvature_gain
    #    - If overshoots curves: Decrease cruise_speed, increase curvature_gain
    # 4. Test with simulated current/sideslip
    #    - If persistent cross-track error: Increase integral_gain
    #    - If integral oscillation: Decrease integral_gain or increase integral_limit
    # 5. Run GWO optimizer to fine-tune
    #
    # Expected Performance (after tuning):
    #   - Cross-track error: <0.3m RMS
    #   - Path completion: >95% within 0.5m of path
    #   - Smooth velocity profile (no abrupt changes)
