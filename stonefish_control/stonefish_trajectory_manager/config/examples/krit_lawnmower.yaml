# Lawnmower Path: 40m x 40m Coverage (4DOF)
#
# Coverage area: 40m (X) × 40m (Y) with 10m line spacing
# Pattern: 5 horizontal lines (X direction) + 5 vertical lines (Y direction)
#
# Coordinate Convention:
#   World Frame: NED (North-East-Down)
#     X: North (-20 to 20), Y: East (-20 to 20), Z: Down (1.5m depth)
#
# Heading Behavior:
#   use_fixed_heading: false → ILOS automatically computes heading

inertial_frame_id: 'world_ned'

waypoints:
  # ===== HORIZONTAL LINES (Y fixed, X varies) =====

  # Horizontal Line 1: Y=-20, X: -20 → 20
  - position: [-20.0, -20.0, 1.5]
    use_fixed_heading: false
  - position: [20.0, -20.0, 1.5]
    use_fixed_heading: false

  # Transition: Move to Y=-10
  - position: [20.0, -10.0, 1.5]
    use_fixed_heading: false

  # Horizontal Line 2: Y=-10, X: 20 → -20 (reverse)
  - position: [-20.0, -10.0, 1.5]
    use_fixed_heading: false

  # Transition: Move to Y=0
  - position: [-20.0, 0.0, 1.5]
    use_fixed_heading: false

  # Horizontal Line 3: Y=0, X: -20 → 20
  - position: [20.0, 0.0, 1.5]
    use_fixed_heading: false

  # Transition: Move to Y=10
  - position: [20.0, 10.0, 1.5]
    use_fixed_heading: false

  # Horizontal Line 4: Y=10, X: 20 → -20 (reverse)
  - position: [-20.0, 10.0, 1.5]
    use_fixed_heading: false

  # Transition: Move to Y=20
  - position: [-20.0, 20.0, 1.5]
    use_fixed_heading: false

  # Horizontal Line 5: Y=20, X: -20 → 20
  - position: [20.0, 20.0, 1.5]
    use_fixed_heading: false

  # ===== VERTICAL LINES (X fixed, Y varies) =====

  # Transition: Move to X=10
  - position: [10.0, 20.0, 1.5]
    use_fixed_heading: false

  # Vertical Line 1: X=10, Y: 20 → -20
  - position: [10.0, -20.0, 1.5]
    use_fixed_heading: false

  # Transition: Move to X=0
  - position: [0.0, -20.0, 1.5]
    use_fixed_heading: false

  # Vertical Line 2: X=0, Y: -20 → 20 (reverse)
  - position: [0.0, 20.0, 1.5]
    use_fixed_heading: false

  # Transition: Move to X=-10
  - position: [-10.0, 20.0, 1.5]
    use_fixed_heading: false

  # Vertical Line 3: X=-10, Y: 20 → -20
  - position: [-10.0, -20.0, 1.5]
    use_fixed_heading: false

  # Transition: Move to X=-20
  - position: [-20.0, -20.0, 1.5]
    use_fixed_heading: false

  # Vertical Line 4: X=-20, Y: -20 → 20 (reverse)
  - position: [-20.0, 20.0, 1.5]
    use_fixed_heading: false

  # Transition: Move to X=20 (skip, already at edge)
  # Vertical Line 5: X=20 already covered in horizontal lines

  # Return to start
  - position: [-20.0, -20.0, 1.5]
    use_fixed_heading: false


