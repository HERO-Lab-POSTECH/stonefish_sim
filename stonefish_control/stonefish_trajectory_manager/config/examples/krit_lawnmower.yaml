# Test Waypoint File: Rectangular Path (4DOF)
#
# Simple rectangular path at constant depth for initial 4DOF ILOS testing.
#
# Coordinate Convention:
#   World Frame: NED (North-East-Down)
#     X: North, Y: East, Z: Down (underwater is positive)
#
# Heading Behavior:
#   use_fixed_heading: false → ILOS automatically computes heading
#
# Purpose: Test 4DOF ILOS guidance with straight segments and 90° turns

inertial_frame_id: 'world_ned'


waypoints:
  - position: [-15.0, 15.0, 4.5]
    use_fixed_heading: false

  - position: [15.0, 15.0, 4.5]
    use_fixed_heading: false

  - position: [15.0, 7.5, 4.5]
    use_fixed_heading: false

  - position: [-15.0, 7.5, 4.5]
    use_fixed_heading: false

  - position: [-15.0, 0.0, 4.5]
    use_fixed_heading: false

  - position: [15.0, 0.0, 4.5]
    use_fixed_heading: false

  - position: [15.0, -7.5, 4.5]
    use_fixed_heading: false

  - position: [-15.0, -7.5, 4.5]
    use_fixed_heading: false

  - position: [-15.0, -15.0, 4.5]
    use_fixed_heading: false

  - position: [15.0, -15.0, 4.5]
    use_fixed_heading: false

  - position: [15.0, 15.0, 4.5]
    use_fixed_heading: false

  - position: [7.5, 15.0, 4.5]
    use_fixed_heading: false

  - position: [7.5, -15.0, 4.5]
    use_fixed_heading: false

  - position: [0.0, -15.0, 4.5]
    use_fixed_heading: false

  - position: [0.0, 15.0, 4.5]
    use_fixed_heading: false

  - position: [-7.5, 15.0, 4.5]
    use_fixed_heading: false

  - position: [-7.5, -15.0, 4.5]
    use_fixed_heading: false

  - position: [-15.0, -15.0, 4.5]
    use_fixed_heading: false

  - position: [-15.0, 15.0, 4.5]
    use_fixed_heading: false


