# Square Path for testing velocity profiler
#
# Use robot_max_speed parameter to set maximum speed.
# Speed will be automatically reduced at corners based on curvature.
# Example: robot_max_speed:=1.5 for fast operation

inertial_frame_id: 'world_ned'

waypoints:
  # Start
  - position: [0.0, 0.0, 1.0]
    use_fixed_heading: false

  # Move North
  - position: [5.0, 0.0, 1.0]
    use_fixed_heading: false

  # Move East and descend
  - position: [5.0, 5.0, 1.5]
    use_fixed_heading: false

  # Move South
  - position: [0.0, 5.0, 1.5]
    use_fixed_heading: false
